name: Publish to NPM

on:
  push:
    branches:
      - master

# OIDC trusted publishing: no long-lived NPM token, immune to the 2FA OTP
# prompt, and npm attaches provenance automatically. Requires a one-time
# Trusted Publisher config on npmjs.com for this package (repo + workflow file).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (unit + coverage gate)
        run: npm test

      - name: Smoke test (built dist artifact)
        run: node scripts/smoke.mjs

      - name: Check if this version is already published
        id: version_check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on npm — skipping publish (bump the version to release)."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION not found on npm — proceeding to publish."
          fi

      # No NODE_AUTH_TOKEN: npm >= 11.5.1 detects the GitHub OIDC environment and
      # exchanges the id-token for a short-lived publish credential at publish time.
      - name: Publish to NPM (OIDC trusted publishing)
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public
