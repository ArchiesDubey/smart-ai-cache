name: Publish to NPM

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (unit + coverage gate)
        run: npm test

      - name: Smoke test (built dist artifact)
        run: node scripts/smoke.mjs

      - name: Check if this version is already published
        id: version_check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on npm — skipping publish (bump the version to release)."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION not found on npm — proceeding to publish."
          fi

      - name: Verify npm authentication
        if: steps.version_check.outputs.already_published == 'false'
        run: |
          echo "Authenticated to npm as: $(npm whoami)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
